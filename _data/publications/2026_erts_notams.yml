title: "Bringing NLP Explainability to Critical Sectors: A Case Study on NOTAMs in Aviation"
authors: "Vincent Mussot, François Hoofd, Fanny Jourdan, <strong>Antonin Poché</strong>"
date: "2026"
venue: "ERTS"
description: |
  Case study on explainability for aviation NOTAM classification, with a framework for selecting NLP explanation methods in critical settings and an aggregation method for local attributions. The paper shows how explainability can surface dataset and model biases in a safety-critical workflow.
