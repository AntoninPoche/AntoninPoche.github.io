title: "Interpreto: An Explainability Library for Transformers"
authors: "<strong>Antonin Poché</strong>*, Thomas Mullor, Gabriele Sarti, Frédéric Boisnard, Corentin Friedrich, Charlotte Claye, François Hoofd, Raphael Bernas, Céline Hudelot, Fanny Jourdan*"
date: "2025"
venue: "Open-source library"
description: |
  Interpreto is a Python library for post-hoc explainability of Hugging Face text models, from encoder-based classifiers to generative LLMs. It combines <strong>attribution methods</strong> and <strong>concept-based explanations</strong> behind a unified API, with documentation, tutorials, and runnable examples.
  The goal is to turn recent interpretability research into tooling that practitioners can use in real NLP workflows.
