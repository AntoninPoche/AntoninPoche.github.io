title: "Xplique: Explainability Toolbox for Neural Networks"
authors: "Thomas Fel, Lucas Hervier, <strong>Antonin Poché</strong>, David Vigouroux, Justin Plakoo, Remi Cadene, Mathieu Chalvidal, Julien Colin, Thibaut Boissin, Louis Bethune, Agustin Picard, Claire Nicodeme, Laurent Gardes, Gregory Flandin, Thomas Serre"
date: "2022"
venue: "Workshop on Explainable Artificial Intelligence for Computer Vision (CVPR)"
description: |
  Xplique is an explainability toolbox for neural networks that brings attribution methods, concept tools, feature visualization, and evaluation metrics into one package. It was originally built for TensorFlow and also supports part of the PyTorch ecosystem.
  I contribute to the library and the broader effort to make explainability methods easier to use, compare, and deploy in practice.
