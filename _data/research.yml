lead: "My PhD aims to build an interpretability agent for language models: a system that can explain model behavior in a way that is both rigorous and genuinely useful."

paragraphs:
  - "A recurring limitation of current explanation methods, especially concept-based approaches, is that their outputs are often hard to evaluate and uneven in quality. I work on making those explanations more consistent, measurable, and actionable."
  - "That direction shaped my first PhD publication, ConSim (ACL 2025), which evaluates concept-based explanations through automated simulatability and provides a reproducible way to compare methods."

cards:
  - title: "Current focus"
    body: "Evaluation protocols for concept-based explanations, grounded in usefulness, simulatability, and practical NLP workflows."
  - title: "What I build"
    body: "Open-source tools and interfaces that connect recent explainability research to real-world language model analysis."
  - title: "Next directions"
    list:
      - "Better interpretation interfaces for concept-based explanations."
      - "Contrastive explanations for language models."
      - "Example-based explanations tailored to NLP systems."

cta_text: "If you work on interpretable NLP, explanation interfaces, or evaluation protocols, I would be glad to discuss a collaboration."
cta_label: "Read ConSim"
cta_href: "https://arxiv.org/abs/2501.05855"
