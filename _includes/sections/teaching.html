<div class="teaching">
  <p class="teaching-summary">{{ site.data.teaching.summary }}</p>

  <div class="teaching-list">
    {% for item in site.data.teaching.entries %}
    <article class="teaching-item">
      <p class="teaching-period">{{ item.period }}</p>
      <div class="teaching-content">
        <h3 class="teaching-title">{{ item.title }}</h3>
        <p class="teaching-description">{{ item.description }}</p>
      </div>
    </article>
    {% endfor %}
  </div>
</div>
